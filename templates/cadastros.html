{% extends "base.html" %}

{% block content %}

{% include "components/nav.html" %}

<style>
  .pagina-titulo {
    font-size: 34px;
    font-weight: 800;
    margin-bottom: 10px;
    color: #111;
  }

  .empresa {
    font-size: 18px;
    margin-bottom: 24px;
    color: #222;
  }

  .menu {
    display: flex;
    flex-wrap: wrap;
    gap: 14px;
  }

  .menu a {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 56px;
    padding: 14px 22px;
    border: 1px solid #c7c7c7;
    border-radius: 12px;
    text-decoration: none;
    color: #1657c8;
    font-weight: 700;
    font-size: 18px;
    background: #f8f8f8;
    transition: 0.15s ease;
  }

  .menu a:hover {
    background: #eeeeee;
    transform: translateY(-1px);
  }
</style>

<div class="pagina-titulo">Cadastros</div>

<div class="empresa">
    <strong>Empresa:</strong> {{ empresa_ativa }} - {{ nome_empresa_ativa }}
</div>

<div class="menu">

    <a href="{{ url_for('financeiro.grupos_gerenciais') }}">Grupos Gerenciais</a>

    <a href="{{ url_for('financeiro.contas_gerenciais') }}">Contas Gerenciais</a>

    <a href="{{ url_for('financeiro.classificacoes_automaticas') }}">
        Classificações Automáticas
    </a>
</div>

{% endblock %}
