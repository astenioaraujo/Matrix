<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Grupos Gerenciais</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            color: #111;
        }

        h2 {
            margin-bottom: 10px;
        }

        .empresa {
            font-size: 18px;
            margin-bottom: 24px;
        }

        .menu {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            margin-bottom: 24px;
        }

        .menu a {
            display: inline-block;
            padding: 14px 22px;
            border: 1px solid #c7c7c7;
            border-radius: 12px;
            text-decoration: none;
            color: #1657c8;
            font-weight: 700;
            font-size: 20px;
            background: #f8f8f8;
        }

        .menu a:hover {
            background: #eeeeee;
        }

        .total {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 14px;
        }

        table {
            border-collapse: collapse;
            width: 900px;
            max-width: 100%;
        }

        th, td {
            border: 1px solid #cfcfcf;
            padding: 10px 12px;
            text-align: left;
        }

        th {
            background: #f2f2f2;
        }

        tbody tr:hover {
            background: #fafafa;
        }
    </style>
</head>
<body>
    <h2>Grupos Gerenciais</h2>

    <div class="empresa">
        <strong>Empresa:</strong> {{ empresa_ativa }} - {{ nome_empresa_ativa }}
    </div>

    <div class="menu">
        <a href="{{ url_for('financeiro.menu_cadastros') }}">Voltar a Cadastros</a>
        <a href="{{ url_for('financeiro.menu_empresa') }}">Voltar ao Menu</a>
    </div>

    <div class="total">
        Total de grupos: {{ grupos|length }}
    </div>

    <table>
        <thead>
            <tr>
                <th>Grupo</th>
                <th>Abreviatura</th>
                <th>Descrição</th>
            </tr>
        </thead>
        <tbody>
            {% for g in grupos %}
            <tr>
                <td>{{ g[0] }}</td>
                <td>{{ g[1] }}</td>
                <td>{{ g[2] }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
