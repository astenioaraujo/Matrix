<div class="barra-navegacao">


  <!-- BOTÃO VOLTAR -->
  {% if url_voltar %}
    <a class="btn-nav btn-nav-voltar" href="{{ url_voltar }}">
      {{ texto_voltar or "← Voltar" }}
    </a>
  {% endif %}

</div>

<style>
  .barra-navegacao {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 18px;
    flex-wrap: wrap;
  }

  /* LOGO */
  .logo-area img {
    height: 42px;
    opacity: 0.95;
  }

  /* BOTÕES */
  .btn-nav {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 44px;
    padding: 10px 18px;
    border-radius: 10px;
    text-decoration: none;
    font-weight: 700;
    font-size: 15px;
    transition: 0.15s ease;
    border: none;
    box-sizing: border-box;
    white-space: nowrap;
  }

  .btn-nav:hover {
    transform: translateY(-1px);
  }

  /* VOLTAR */
  .btn-nav-voltar {
    background: #fff4a3;
    color: #333;
    border: 1px solid #e6d96a;
  }

  .btn-nav-voltar:hover {
    background: #ffec80;
  }

  /* PADRÃO MARROM (se usar depois) */
  .btn-nav-modulo {
    background: #6b4f2a;
    color: #fff;
  }

  .btn-nav-modulo:hover {
    background: #5a4123;
  }
</style>
