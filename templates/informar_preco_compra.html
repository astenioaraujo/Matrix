{% extends "base.html" %}
{% block content %}

{% include "components/nav.html" %}

<style>
  .pagina-titulo { font-size: 34px; font-weight: 800; margin-bottom: 10px; }
  .empresa { font-size: 22px; margin-bottom: 24px; }
  .painel-form {
    max-width: 1100px; background: #fff; border: 1px solid #d9d9d9;
    border-radius: 16px; padding: 24px; box-shadow: 0 6px 20px rgba(0,0,0,0.06);
  }
  .linha-topo {
    display: grid; grid-template-columns: 220px 1fr; gap: 18px;
    align-items: end; margin-bottom: 24px;
  }
  .campo label { display: block; font-weight: 700; margin-bottom: 6px; }
  .campo input { width: 100%; box-sizing: border-box; }
  table { width: 100%; border-collapse: collapse; font-size: 14px; background: #fff; }
  th, td { border: 1px solid #dcdcdc; padding: 10px 12px; white-space: nowrap; }
  th { background: #f1f1f1; text-align: left; }
  .col-num { width: 180px; text-align: right; }
  .input-preco { width: 150px; }
  .status-salvo { margin-left: 10px; font-size: 12px; font-weight: 700; color: #1e6b34; }
  .status-erro { color: #9f2f2f; }
  .btn-carregar {
    padding: 10px 16px;
    border-radius: 10px;
    border: 1px solid #1565c0;
    background: #1565c0;
    color: #fff;
    font-weight: 700;
    cursor: pointer;
    height: 42px;
}

.btn-carregar:hover {
  opacity: 0.95;
}

</style>

<div class="pagina-titulo">Informar Preço de Compra</div>

<div class="empresa">
  <strong>Empresa:</strong> {{ cod_empresa }} - {{ nome_empresa }}
</div>

<div class="painel-form">
  <div class="linha-topo">
    <div class="campo">
      <label for="data_preco">Data</label>
      <input
        type="date"
        id="data_preco"
        value="{{ data_sel }}"
        onchange="window.location='{{ url_for('operacoes.informar_preco_compra') }}?data=' + this.value"
      >
    </div>
  
    <div class="campo" style="display:flex; align-items:flex-end;">
      <button
        type="button"
        class="btn-carregar"
        onclick="window.location='{{ url_for('operacoes.informar_preco_compra') }}?data=' + document.getElementById('data_preco').value"
      >
        Carregar
      </button>
    </div>
  </div>

  <table>
    <thead>
      <tr>
        <th>Código</th>
        <th>Produto</th>
        <th class="col-num">Preço de Compra</th>
      </tr>
    </thead>
    <tbody>
      {% for p in produtos %}
      <tr>
        <td>{{ p.cod_produto }}</td>
        <td>{{ p.descricao }}</td>
        <td class="col-num">
          <input
            type="text"
            inputmode="decimal"
            class="input-preco campo-valor"
            data-cod-produto="{{ p.cod_produto }}"
            value="{{ precos_existentes.get(p.cod_produto|string, '') }}"
          >
          <span class="status-salvo" id="status_{{ p.cod_produto }}"></span>
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>

<script>
function formatarNumeroBR(valor) {
  if (!valor) return "";
  valor = valor.toString().replace(/\D/g, "");
  if (valor === "") return "";
  valor = (parseInt(valor, 10) / 100).toFixed(2);
  valor = valor.replace(".", ",");
  valor = valor.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
  return valor;
}

function normalizarValorExistente(valor) {
  if (!valor && valor !== 0) return "";

  let texto = valor.toString().trim();
  if (texto.includes(",")) return texto;

  let numero = Number(texto);
  if (isNaN(numero)) return texto;

  return numero.toLocaleString("pt-BR", {
    minimumFractionDigits: 2,
    maximumFractionDigits: 2
  });
}

async function salvarCampo(input) {
  if (input.dataset.salvando === "1") return;

  const codProduto = input.dataset.codProduto;
  const dataPreco = document.getElementById("data_preco").value;
  const status = document.getElementById("status_" + codProduto);

  const formData = new URLSearchParams();
  formData.append("data_preco", dataPreco);
  formData.append("cod_produto", codProduto);
  formData.append("valor", input.value);

  input.dataset.salvando = "1";
  status.textContent = "Salvando...";
  status.classList.remove("status-erro");

  try {
    const resposta = await fetch('{{ url_for("operacoes.ajax_salvar_preco_compra") }}', {
      method: "POST",
      headers: {
        "Content-Type": "application/x-www-form-urlencoded",
        "X-Requested-With": "XMLHttpRequest"
      },
      body: formData.toString()
    });

    const data = await resposta.json();

    if (data.ok) {
      status.textContent = "Salvo";
      setTimeout(() => status.textContent = "", 1500);
    } else {
      status.textContent = data.erro || "Erro";
      status.classList.add("status-erro");
    }
  } catch (e) {
    status.textContent = "Erro ao salvar";
    status.classList.add("status-erro");
  } finally {
    input.dataset.salvando = "0";
  }
}

document.querySelectorAll(".campo-valor").forEach(function(input) {
  input.value = normalizarValorExistente(input.value);

  input.addEventListener("input", function() {
    this.value = formatarNumeroBR(this.value);
  });

  input.addEventListener("keydown", function(e) {
    if (e.key === "Enter") {
      e.preventDefault();
      salvarCampo(this);
    }
  });

  input.addEventListener("blur", function() {
    salvarCampo(this);
  });

  input.addEventListener("focus", function() {
    this.select();
  });
});
</script>

{% endblock %}
