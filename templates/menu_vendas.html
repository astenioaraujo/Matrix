{% extends "base.html" %}

{% block content %}
{% include "components/nav.html" %}

<style>
  .pagina-titulo {
    font-size: 36px;
    font-weight: 700;
    margin-bottom: 10px;
  }

  .empresa {
    font-size: 22px;
    margin-bottom: 30px;
  }

  .menu-botoes {
    display: grid;
    grid-template-columns: repeat(auto-fill, 220px);
    gap: 14px;
    margin-bottom: 40px;
  }

  .menu-botoes a {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 220px;
    height: 60px;
    border-radius: 12px;
    text-decoration: none;
    font-weight: 600;
    font-size: 16px;
    color: white;
    box-shadow: 0 3px 8px rgba(0,0,0,0.15);
    transition: all 0.2s ease;
    text-align: center;
    padding: 0 10px;
    box-sizing: border-box;
  }

  .menu-botoes a:hover {
    transform: translateY(-2px);
    filter: brightness(0.95);
  }

  .btn-painel { background: #1565c0; }
  .btn-diarias { background: #00897b; }
  .btn-consultas { background: #5e35b1; }
  .btn-produto {background: var(--yellow);color: #000 !important;}
  .btn-voltar { background: #444; }

</style>

<div class="card">

  <div class="pagina-titulo">Menu de Vendas</div>

  <div class="empresa">
    <strong>Empresa:</strong> {{ nome_empresa }}
  </div>

  <div class="menu-botoes">

    <a class="btn-painel" href="{{ url_for('vendas.vendas_painel') }}">
      Painel
    </a>

    <a class="btn-diarias" href="{{ url_for('vendas.vendas_diarias') }}">
      Vendas Diárias
    </a>

    <a class="btn-consultas" href="{{ url_for('vendas.vendas_consultas') }}">
      Consultas
    </a>

    <a class="btn-produto" href="{{ url_for('vendas.vendas_consulta_produto') }}">
      Consulta por Produto
    </a>

  </div>

</div>

{% endblock %}
