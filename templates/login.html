{% extends "base.html" %}
{% block content %}

<style>
  .login-box {
    max-width: 420px;
    margin: 40px auto;
    background: #fff;
    border: 1px solid #d9d9d9;
    border-radius: 12px;
    padding: 24px;
  }

  .login-titulo {
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 18px;
  }

  .linha-form {
    margin-bottom: 14px;
  }

  .linha-form label {
    display: block;
    font-weight: 700;
    margin-bottom: 6px;
  }

  .linha-form input {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid #c9c9c9;
    border-radius: 8px;
    box-sizing: border-box;
  }

  .btn-login {
    background: #1565c0;
    color: #fff;
    border: 1px solid #1565c0;
    padding: 10px 16px;
    border-radius: 10px;
    font-weight: 700;
    cursor: pointer;
  }

  .flash-msg {
    padding: 10px 14px;
    border-radius: 8px;
    margin-bottom: 12px;
    font-weight: 600;
  }

  .flash-error {
    background: #fdeaea;
    color: #9f2f2f;
    border: 1px solid #efc2c2;
  }
</style>

<div class="login-box">
  <div class="login-titulo">Login</div>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for category, message in messages %}
        <div class="flash-msg flash-error">{{ message }}</div>
      {% endfor %}
    {% endif %}
  {% endwith %}

  <form method="post">
    <div class="linha-form">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" required>
    </div>

    <div class="linha-form">
      <label for="senha">Senha</label>
      <input type="password" id="senha" name="senha" required>
    </div>

    <button type="submit" class="btn-login">Entrar</button>
  </form>
</div>

{% endblock %}
